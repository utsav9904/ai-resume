    <meta charset="UTF-8" />

    <!-- ═══════════════════════════════════════════

    ════════════════════════════════════════════ -->

    <meta name="description" content="Build professional, ATS-optimized resumes in minutes with AI. Get AI-generated summaries, cover letters, and skill suggestions. Choose from 3 premium templates. Free forever." />

    <!-- ═══════════════════════════════════════════
         JSON-LD STRUCTURED DATA (Google Rich Results)
    ════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ResumeAI",
      "url": "https://ai-resume-builder.vercel.app/",
      "description": "Free AI-powered resume builder that helps you create ATS-friendly resumes, generate professional summaries, tailor your resume to any job description, and produce cover letters.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "AI-generated professional summaries",
        "AI cover letter generator",
        "Job description resume tailoring",
        "3 premium resume templates",
        "PDF export",
        "ATS-optimized formatting",
        "Real-time live preview",
        "Drag-and-drop reordering"
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "128"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is ResumeAI free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, ResumeAI is completely free to use. You can create, edit, and download your resume as a PDF at no cost."
          }
        },
        {
          "@type": "Question",
          "name": "Are the resumes ATS-friendly?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, all ResumeAI templates are designed to pass Applicant Tracking Systems (ATS) with clean formatting and proper keyword structure."
          }
        },
        {
          "@type": "Question",
          "name": "Can I generate a cover letter with AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Paste any job description into the Cover Letter tab and the AI will instantly generate a personalized, professional cover letter tailored to that specific role."
          }
        },
        {
          "@type": "Question",
          "name": "How does the Job Tailoring feature work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Paste a job description into the Job Tailor tab. The AI analyzes your resume against the posting and suggests specific keywords and improvements to help your resume get past ATS filters and match the role."
          }
        }
      ]
    }
    </script>
